services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # exposed so integration tests can assert PUBSUB CHANNELS
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  api-1:
    build: .
    environment:
      NODE_ID: api-1
      PORT: "3000"
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3000" # direct access — the cross-server test connects to each node deliberately
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20

  api-2:
    build: .
    environment:
      NODE_ID: api-2
      PORT: "3000"
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client:/usr/share/nginx/html:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
