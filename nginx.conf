worker_processes auto;

events {
  worker_connections 10240;
}

http {
  include /etc/nginx/mime.types;

  upstream api {
    # least_conn, NOT sticky sessions — the whole architecture exists so that
    # stickiness is unnecessary. Any watcher on any node hears any driver.
    least_conn;
    server api-1:3000;
    server api-2:3000;
  }

  server {
    listen 8080;

    location /ws {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # WebSockets are long-lived and mostly quiet; don't let nginx sever an
      # idle-but-healthy connection too eagerly.
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }
  }
}
