worker_processes auto;

events {
  worker_connections 10240;
}

http {
  include /etc/nginx/mime.types;

  upstream api {
    # least_conn, NOT sticky sessions — the whole architecture exists so that
    # stickiness is unnecessary. Any watcher on any node hears any driver.
    least_conn;
    server api-1:3000;
    server api-2:3000;
  }

  server {
    listen 8080;

    location /ws {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # Must exceed the server's 15s heartbeat interval: nginx severs upstream
      # connections idle for proxy_read_timeout, and the server's pings (plus
      # client pongs) are exactly the traffic that resets it. 60s gives ~4
      # missed-ping margin before nginx would kill a healthy-but-quiet socket.
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location /drivers {
      proxy_pass http://api;
    }

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }
  }
}
