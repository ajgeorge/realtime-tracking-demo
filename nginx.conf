worker_processes auto;

events {
  worker_connections 10240;
}

http {
  include /etc/nginx/mime.types;
  # The server block lives in nginx/templates/default.conf.template — nginx's
  # image envsubst's it at startup so the same config works against
  # docker-compose service names and Railway's private-network hostnames.
  include /etc/nginx/conf.d/*.conf;
}
